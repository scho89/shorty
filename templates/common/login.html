{% extends 'base.html' %}

{% block content %}
<div class="container my-3">
    <form method="post" action="{% url 'common:login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        {% include "form_errors.html" %}
        <div class="mb-3">
            <label for="username">사용자 ID</label>
            <input type="text" class="form-control" name="username" id="username" value="{{ form.username.value|default_if_none:'' }}">
        </div>

        <div class="mb-3">
            <label for="password">비밀번호</label>
            <input type="password" class="form-control" name="password" id="password" value="{{ form.password.value|default_if_none:'' }}">
        </div>

        {% if recaptcha_enabled %}
        <div class="mb-3">
            <div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}" data-callback="recaptcha"></div>
        </div>
        {% elif recaptcha_bypassed %}
        <div class="alert alert-secondary py-2" role="alert">
            개발/테스트 환경에서는 reCAPTCHA 검증이 생략됩니다.
        </div>
        {% endif %}

        <button class="btn btn-primary" type="submit">로그인</button>
    </form>
</div>

{% endblock %}

{% block script %}
{% if recaptcha_enabled %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endif %}
{% endblock %}
