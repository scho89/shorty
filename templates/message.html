{% if messages %}
<div class="flash-stack">
    {% for message in messages %}
    <div class="flash-message alert-auto-dismissible">
        {{ message }}
    </div>
    {% endfor %}
</div>
<script>
    window.setTimeout(function () {
        document.querySelectorAll(".alert-auto-dismissible").forEach(function (el) {
            el.remove();
        });
    }, 4000);
</script>
{% endif %}
