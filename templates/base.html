{% load static %}
<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'brand.css' %}">
    <title>Shorty</title>
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="site-shell">
        {% include "navbar.html" %}
        {% include "message.html" %}
        {% block content %}{% endblock %}
    </div>
    <script>
        (function () {
            var menus = Array.prototype.slice.call(document.querySelectorAll('.nav-menu'));
            if (!menus.length) {
                return;
            }

            function closeMenu(menu) {
                menu.removeAttribute('open');
            }

            function closeAll(exceptMenu) {
                menus.forEach(function (menu) {
                    if (menu !== exceptMenu && menu.hasAttribute('open')) {
                        closeMenu(menu);
                    }
                });
            }

            document.addEventListener('pointerdown', function (event) {
                var clickedInsideMenu = menus.find(function (menu) {
                    return menu.contains(event.target);
                });

                if (!clickedInsideMenu) {
                    closeAll(null);
                }
            }, true);

            menus.forEach(function (menu) {
                menu.addEventListener('toggle', function () {
                    if (menu.open) {
                        closeAll(menu);
                    }
                });
            });

            document.addEventListener('keydown', function (event) {
                if (event.key !== 'Escape') {
                    return;
                }

                closeAll(null);
            });
        }());
    </script>
    {% block script %}{% endblock %}
</body>
</html>
