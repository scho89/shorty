<style>
    .cloud-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 0;
        list-style: none;
    }

    .cloud-list a {
        --size: 4;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 14px;
        border-radius: 999px;
        font-size: calc(var(--size) * 0.14rem + 0.72rem);
        background: #eff6ff;
        color: #1d4ed8;
        transition: transform 0.18s ease, background 0.18s ease;
    }

    .cloud-list a:hover {
        transform: translateY(-1px);
        background: #dbeafe;
    }

    {% for color in colors %}
    .cloud-list a[data-weight="{{ forloop.counter }}"] {
        --size: {{ forloop.counter }};
        color: {{ color }};
    }
    {% endfor %}
</style>

<div class="cloud-wrap">
    <ul class="cloud-list" role="navigation" aria-label="Short link cloud">
    {% for wc in wc_data %}
        <li><a href="{{ wc.url }}" data-weight="{{ wc.weight }}" title="{{ wc.short_url }}" target="_blank" rel="noopener noreferrer">{{ wc.alias }}</a></li>
    {% endfor %}
    </ul>
</div>
